# whispeer-server configuration
# All values can be overridden by environment variables:
#   WHISPER_HOST, WHISPER_PORT, WHISPER_LOG_LEVEL
#   WHISPER_MODEL, WHISPER_DEVICE, WHISPER_COMPUTE
#   WHISPER_CONFIG=/path/to/alternate/config.yaml

language: fr           # BCP-47 language code: fr | en | en-gb
                       # Drives transcribe.language, kokoro.lang_code, kokoro.default_voice
                       # Uncomment the per-component keys below to override individually

server:
  host: "127.0.0.1"      # bind address — use "0.0.0.0" to expose on all interfaces
  port: 8000             # TCP port
  log_level: "info"      # debug | info | warning | error | critical

model:
  name: "turbo"           # tiny | base | small | medium | large-v3 | turbo
  device: "cuda"           # cpu | cuda | auto
  compute_type: "float16" # int8 (fastest, CPU-friendly) | int8_float16 | float16 | default
                          # float16 requires CUDA; int8 is best for CPU-only

transcribe:
  beam_size: 5           # 1–10; higher = more accurate, slower
  temperature: 0.0       # 0.0 = greedy decoding; increase (e.g. 0.2) if output is repetitive
  vad_filter: true       # strip silent segments before transcription (recommended)
  # language: fr         # override: BCP-47 code; derived from top-level language: when omitted
  condition_on_previous_text: true  # use prior context to improve coherence

translate:
  beam_size: 5           # same as transcribe.beam_size
  temperature: 0.0       # same as transcribe.temperature
  vad_filter: true       # same as transcribe.vad_filter
  condition_on_previous_text: true  # same as transcribe.condition_on_previous_text
  # Note: translation always outputs English regardless of source language

# ---------------------------------------------------------------------------
# Kokoro TTS — runs in-process as a Python library
# ---------------------------------------------------------------------------
kokoro:
  # lang_code: "f"              # override: a=American English  b=British English  f=French
                                # derived from top-level language: when omitted
  # default_voice: "ff_siwis"   # override: must match lang_code prefix; derived when omitted
  default_speed: 1.0            # 0.5–2.0; speech rate multiplier
  activate_base_arkit: true     # enable POST /tts/arkit  → ARKit blendshapes via viseme pipeline
  activate_words: false         # enable POST /tts/words  → word-level timestamps + audio
  activate_audio2face: false    # enable POST /tts/audio2face → ARKit via Nvidia Audio2Face-3D gRPC
  arkit_level: 3                # 1 = basic (~10 shapes)  2 = advanced/default (27)  3 = full suit (adds brow/squint)
  debug_dump_arkit: false       # dump each /tts/arkit response as JSON to ./tmp/ (omits audio)
  fps: 60                       # frames per second for arkit mode (24, 30, or 60 typical)
                                # ignored in audio2face mode — A2F always outputs at 30 FPS
  output_sample_rate: 48000     # WAV output sample rate in Hz (Kokoro native is 24000)

# ---------------------------------------------------------------------------
# Nvidia Audio2Face-3D — local gRPC microservice
# Only used when kokoro.activate_audio2face is true.
# Install: docker run --gpus all nvcr.io/nim/nvidia/audio2face-3d:2.0
# Proto stubs: pip install <nvidia_ace wheel from NVIDIA/Audio2Face-3D-Samples>
# ---------------------------------------------------------------------------
audio2face:
  host: "localhost"
  port: 52000
  timeout: 30.0                # seconds — must cover full streaming call duration

# ---------------------------------------------------------------------------
# OCC Emotion Classification — enriches /stt/transcribe and /stt/translate
# responses with an "emotion" field (json / verbose_json formats only).
# Requires Ollama running locally, or a fine-tuned LoRA adapter.
# ---------------------------------------------------------------------------
occ:
  enabled: true
  mode: lora                 # "ollama" | "lora"
  ollama_url: http://localhost:11434
  ollama_model: mistral
  lora_model_path: ./mistral-occ-lora   # path to LoRA adapter dir (mode=lora only)
  max_vram_gb: null                      # cap VRAM usage for the LoRA model (mode=lora only)
                                        # layers that don't fit spill to CPU RAM automatically
                                        # set to null (or omit) to fill VRAM first with no cap
